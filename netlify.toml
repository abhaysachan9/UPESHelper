[build]
  publish = "public"
  command = "echo 'No build command required for vanilla frontend'"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["server/**"]

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/call-enabled"
  to = "/.netlify/functions/call-enabled"
  status = 200

[[redirects]]
  from = "/api/call-config"
  to = "/.netlify/functions/call-config"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
