<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description"
    content="UPES Helper — A smart AI-powered university assistant. Get instant answers about fees, admissions, courses, hostel, scholarships and more.">
  <title>UPES Helper — Smart University Assistant</title>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://upeshelper.netlify.app/">
  <meta property="og:title" content="UPES Helper — Smart University Assistant">
  <meta property="og:description" content="A smart AI-powered university assistant. Get instant answers about fees, admissions, courses, hostel, scholarships and more.">
  <meta property="og:image" content="https://upeshelper.netlify.app/assets/upesimg.svg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://upeshelper.netlify.app/">
  <meta property="twitter:title" content="UPES Helper — Smart University Assistant">
  <meta property="twitter:description" content="A smart AI-powered university assistant. Get instant answers about fees, admissions, courses, hostel, scholarships and more.">
  <meta property="twitter:image" content="https://upeshelper.netlify.app/assets/upesimg.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" defer></script>
</head>

<body>

  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header class="header" id="header">
    <div class="header-inner">
      <a class="header-brand" href="/" aria-label="UPES Helper Home">
        <img src="/assets/upesimg.svg" alt="UPES" class="header-logo">
        <span class="header-wordmark"> <span>Helper</span></span>
      </a>

      <div class="header-actions">
        <div class="font-controls" role="group" aria-label="Font size">
          <button onclick="setFontSize('small')" id="font-sm" title="Default size">A</button>
          <button onclick="setFontSize('medium')" id="font-md" title="Large size">A+</button>
          <button onclick="setFontSize('large')" id="font-lg" title="Extra large">A++</button>
        </div>
        <select id="language-select" class="header-select" title="Select language" aria-label="Select language">
          <option value="en-IN">English</option>
          <option value="hi-IN">हिन्दी (Hindi)</option>
          <option value="bn-IN">বাংলা (Bengali)</option>
          <option value="ta-IN">தமிழ் (Tamil)</option>
          <option value="te-IN">తెలుగు (Telugu)</option>
          <option value="mr-IN">मराठी (Marathi)</option>
          <option value="es-ES">Español (Spanish)</option>
          <option value="fr-FR">Français (French)</option>
          <option value="de-DE">Deutsch (German)</option>
          <option value="zh-CN">中文 (Chinese)</option>
          <option value="ja-JP">日本語 (Japanese)</option>
          <option value="ko-KR">한국어 (Korean)</option>
          <option value="ar-SA">العربية (Arabic)</option>
          <option value="pt-BR">Português (Portuguese)</option>
          <option value="ru-RU">Русский (Russian)</option>
          <option value="it-IT">Italiano (Italian)</option>
          <option value="nl-NL">Nederlands (Dutch)</option>
          <option value="tr-TR">Türkçe (Turkish)</option>
          <option value="vi-VN">Tiếng Việt (Vietnamese)</option>
          <option value="th-TH">ไทย (Thai)</option>
        </select>
        <button id="theme-btn" class="header-btn" title="Toggle theme" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button id="clear-btn" class="header-btn" title="New conversation" aria-label="New conversation"
          style="display:none">
          <i class="fa-solid fa-pen-to-square"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- ─── Landing State ──────────────────────────────────────── -->
  <main class="landing" id="landing">
    <div class="landing-container">
      <div class="landing-hero">
        <div class="hero-badge" aria-hidden="true">
          <div class="lottie-graduation-hat"></div>
        </div>
        <h1 class="landing-heading">
          Your smart assistant for
          all things at <img src="/assets/upesimg.svg" alt="UPES" class="heading-logo">
        </h1>
        <p class="landing-sub">
          Get instant, verified answers about admissions, fees, courses, scholarships, hostel, placements, and campus
          life.
        </p>
      </div>

      <div class="landing-topics" role="list" aria-label="Suggested questions">
        <div role="listitem">
          <button class="topic-card" data-question="What is the B.Tech fee structure at UPES for 2026-27?">
            <span class="topic-icon"><i class="fa-solid fa-indian-rupee-sign"></i></span>
            <span class="topic-body">
              <span class="topic-label">Fee Structure 2026-27</span>
              <span class="topic-desc">Semester-wise tuition &amp; academic fees</span>
            </span>
          </button>
        </div>
        <div role="listitem">
          <button class="topic-card" data-question="What are the last dates to apply and exam dates for UPES 2026 admissions?">
            <span class="topic-icon"><i class="fa-solid fa-calendar-days"></i></span>
            <span class="topic-body">
              <span class="topic-label">Admission Deadlines</span>
              <span class="topic-desc">Last dates, exam schedule &amp; how to apply</span>
            </span>
          </button>
        </div>
        <div role="listitem">
          <button class="topic-card" data-question="What is the highest placement package at UPES and which companies recruit on campus?">
            <span class="topic-icon"><i class="fa-solid fa-chart-line"></i></span>
            <span class="topic-body">
              <span class="topic-label">Placements &amp; Packages</span>
              <span class="topic-desc">Highest CTC, top recruiters &amp; placement rate</span>
            </span>
          </button>
        </div>
        <div role="listitem">
          <button class="topic-card" data-question="What scholarships does UPES offer for 2026-27 and what is the eligibility?">
            <span class="topic-icon"><i class="fa-solid fa-award"></i></span>
            <span class="topic-body">
              <span class="topic-label">Scholarships 2026-27</span>
              <span class="topic-desc">Merit, sports, domicile &amp; need-based aid</span>
            </span>
          </button>
        </div>
        <div role="listitem">
          <button class="topic-card" data-question="What is the UPESEAT exam pattern, syllabus and eligibility for B.Tech admission?">
            <span class="topic-icon"><i class="fa-solid fa-file-pen"></i></span>
            <span class="topic-body">
              <span class="topic-label">UPESEAT / Entrance Exams</span>
              <span class="topic-desc">Exam pattern, syllabus &amp; eligibility criteria</span>
            </span>
          </button>
        </div>
        <div role="listitem">
          <button class="topic-card" data-question="How does the Design Your Own Degree program work at UPES?">
            <span class="topic-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></span>
            <span class="topic-body">
              <span class="topic-label">Design Your Own Degree</span>
              <span class="topic-desc">Custom majors, minors &amp; 50+ combinations</span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- ─── Chat State ──────────────────────────────────────────── -->
  <div class="chat-view" id="chat-view" aria-hidden="true">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <h2 class="sidebar-heading">Explore Topics</h2>
        <nav class="sidebar-nav">
          <button class="sidebar-link" data-question="What is the B.Tech fee structure at UPES for 2026-27?">
            <i class="fa-solid fa-indian-rupee-sign"></i> <span>Fee Structure 2026-27</span>
          </button>
          <button class="sidebar-link" data-question="What are the last dates to apply and exam dates for UPES 2026 admissions?">
            <i class="fa-solid fa-calendar-days"></i> <span>Admission Deadlines</span>
          </button>
          <button class="sidebar-link" data-question="What is the highest placement package at UPES and which companies recruit on campus?">
            <i class="fa-solid fa-chart-line"></i> <span>Placements &amp; Packages</span>
          </button>
          <button class="sidebar-link" data-question="What scholarships does UPES offer for 2026-27 and what is the eligibility?">
            <i class="fa-solid fa-award"></i> <span>Scholarships 2026-27</span>
          </button>
          <button class="sidebar-link" data-question="What is the UPESEAT exam pattern, syllabus and eligibility for B.Tech admission?">
            <i class="fa-solid fa-file-pen"></i> <span>UPESEAT / Entrance Exams</span>
          </button>
          <button class="sidebar-link" data-question="How does the Design Your Own Degree program work at UPES?">
            <i class="fa-solid fa-wand-magic-sparkles"></i> <span>Design Your Own Degree</span>
          </button>
          <button class="sidebar-link" data-question="What courses and programs does UPES offer across all schools?">
            <i class="fa-solid fa-book-open"></i> <span>Courses &amp; Programs</span>
          </button>
          <button class="sidebar-link" data-question="How does UPES provide global exposure and international collaborations?">
            <i class="fa-solid fa-globe"></i> <span>Global Opportunities</span>
          </button>
        </nav>
      </div>
    </aside>
    <div class="chat-main">
      <div class="messages-scroll" id="messages-scroll">
        <div class="messages-inner" id="messages-inner" role="log" aria-live="polite" aria-label="Chat messages">
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Composer (shared, always pinned bottom) ─────────────── -->
  <div class="composer" id="composer">
    <div class="composer-inner">
      <div class="composer-box" id="input-box">
        <textarea id="chat-input" rows="1" placeholder="Ask about admissions, fees, placements…"
          aria-label="Message UPES Helper" autocomplete="off" spellcheck="true" maxlength="2000"></textarea>
        <div class="composer-actions">
          <button class="composer-btn voice-btn" id="voice-btn" title="Voice input" aria-label="Voice input">
            <i class="fa-solid fa-microphone"></i>
          </button>
          <button class="composer-btn send-btn" id="send-btn" aria-label="Send message" title="Send" disabled>
            <i class="fa-solid fa-arrow-up"></i>
          </button>
        </div>
      </div>
      <p class="composer-note">Answers from UPES knowledge base · <a href="https://www.upes.ac.in" target="_blank"
          rel="noopener">Verify at upes.ac.in</a></p>
    </div>
  </div>

  <!-- ─── Floating Call FAB ─────────────────────────────────────── -->
  <button class="call-fab" id="call-btn" title="Voice call" aria-label="Start AI voice call">
    <span class="call-fab-pulse"></span>
    <i class="fa-solid fa-phone"></i>
  </button>

  <!-- ─── Voice Call Overlay ──────────────────────────────────── -->
  <div class="call-overlay" id="call-overlay" aria-hidden="true" role="dialog" aria-label="AI Voice Call">
    <div class="call-container">
      <div class="call-avatar-ring">
        <div class="call-ripple"></div>
        <div class="call-ripple r2"></div>
        <div class="call-ripple r3"></div>
        <div class="call-avatar">
          <div class="lottie-graduation-hat"></div>
        </div>
      </div>

      <h2 class="call-name">UPES Helper</h2>
      <p class="call-status" id="call-status">Connecting…</p>
      <p class="call-timer" id="call-timer">00:00</p>

      <div class="call-visualizer" aria-hidden="true">
        <span class="viz-bar" style="--i:1"></span>
        <span class="viz-bar" style="--i:2"></span>
        <span class="viz-bar" style="--i:3"></span>
        <span class="viz-bar" style="--i:4"></span>
        <span class="viz-bar" style="--i:5"></span>
        <span class="viz-bar" style="--i:6"></span>
        <span class="viz-bar" style="--i:7"></span>
      </div>

      <div class="call-transcription" id="call-transcription"></div>

      <div class="call-actions">
        <button class="call-action-btn" id="call-mute" title="Mute">
          <i class="fa-solid fa-microphone"></i>
          <span>Mute</span>
        </button>
        <button class="call-action-btn end" id="call-end" title="End call">
          <i class="fa-solid fa-phone-slash"></i>
          <span>End</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>

</html>
