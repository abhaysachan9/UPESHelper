<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="UPES Helper — A smart AI-powered university assistant. Get instant answers about fees, admissions, courses, hostel, scholarships and more." />
  <title>UPES Helper — Smart University Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" defer></script>
</head>

<body>

  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header class="header" id="header">
    <div class="header-inner">
      <a class="header-brand" href="/" aria-label="UPES Helper Home">
        <img src="/assets/upesimg.svg" alt="UPES" class="header-logo" />
        <span class="header-wordmark"> <span>Helper</span></span>
      </a>

      <div class="header-actions">
        <div class="font-controls" role="group" aria-label="Font size">
          <button onclick="setFontSize('small')" id="font-sm" title="Default size">A</button>
          <button onclick="setFontSize('medium')" id="font-md" title="Large size">A+</button>
          <button onclick="setFontSize('large')" id="font-lg" title="Extra large">A++</button>
        </div>
        <button id="theme-btn" class="header-btn" title="Toggle theme" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button id="clear-btn" class="header-btn" title="New conversation" aria-label="New conversation"
          style="display:none">
          <i class="fa-solid fa-pen-to-square"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- ─── Landing State ──────────────────────────────────────── -->
  <main class="landing" id="landing">
    <div class="landing-container">
      <div class="landing-hero">
        <div class="hero-badge" aria-hidden="true">
          <div class="lottie-graduation-hat"></div>
        </div>
        <h1 class="landing-heading">
          Your smart assistant for
          all things <span class="text-accent">UPES</span>
        </h1>
        <p class="landing-sub">
          Get instant, verified answers about admissions, fees, courses, scholarships, hostel, placements, and campus
          life.
        </p>
      </div>

      <div class="landing-topics" role="list" aria-label="Suggested questions">
        <button class="topic-card" data-question="What is the fees structure at UPES?" role="listitem">
          <span class="topic-icon"><i class="fa-solid fa-indian-rupee-sign"></i></span>
          <div class="topic-body">
            <span class="topic-label">Fees Structure</span>
            <span class="topic-desc">Tuition, hostel &amp; other charges</span>
          </div>
        </button>
        <button class="topic-card" data-question="How does the UPES admission process work?" role="listitem">
          <span class="topic-icon"><i class="fa-solid fa-file-pen"></i></span>
          <div class="topic-body">
            <span class="topic-label">Admission Process</span>
            <span class="topic-desc">Steps, eligibility &amp; deadlines</span>
          </div>
        </button>
        <button class="topic-card" data-question="What courses and programs does UPES offer?" role="listitem">
          <span class="topic-icon"><i class="fa-solid fa-book-open"></i></span>
          <div class="topic-body">
            <span class="topic-label">Courses &amp; Programs</span>
            <span class="topic-desc">UG, PG &amp; doctoral offerings</span>
          </div>
        </button>
        <button class="topic-card" data-question="Tell me about UPES hostel facilities." role="listitem">
          <span class="topic-icon"><i class="fa-solid fa-bed"></i></span>
          <div class="topic-body">
            <span class="topic-label">Hostel Facilities</span>
            <span class="topic-desc">Rooms, amenities &amp; campus living</span>
          </div>
        </button>
        <button class="topic-card" data-question="What scholarships are available at UPES?" role="listitem">
          <span class="topic-icon"><i class="fa-solid fa-award"></i></span>
          <div class="topic-body">
            <span class="topic-label">Scholarships</span>
            <span class="topic-desc">Merit, need-based &amp; special awards</span>
          </div>
        </button>
        <button class="topic-card" data-question="What are UPES placement statistics?" role="listitem">
          <span class="topic-icon"><i class="fa-solid fa-chart-line"></i></span>
          <div class="topic-body">
            <span class="topic-label">Placements</span>
            <span class="topic-desc">Recruiters, packages &amp; statistics</span>
          </div>
        </button>
      </div>
    </div>
  </main>

  <!-- ─── Chat State ──────────────────────────────────────────── -->
  <div class="chat-view" id="chat-view" aria-hidden="true">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <h3 class="sidebar-heading">Explore Topics</h3>
        <nav class="sidebar-nav">
          <button class="sidebar-link" data-question="What is the fees structure at UPES?">
            <i class="fa-solid fa-indian-rupee-sign"></i> <span>Fees Structure</span>
          </button>
          <button class="sidebar-link" data-question="How does the UPES admission process work?">
            <i class="fa-solid fa-file-pen"></i> <span>Admission Process</span>
          </button>
          <button class="sidebar-link" data-question="What courses and programs does UPES offer?">
            <i class="fa-solid fa-book-open"></i> <span>Courses &amp; Programs</span>
          </button>
          <button class="sidebar-link" data-question="Tell me about UPES hostel facilities.">
            <i class="fa-solid fa-bed"></i> <span>Hostel Facilities</span>
          </button>
          <button class="sidebar-link" data-question="What scholarships are available at UPES?">
            <i class="fa-solid fa-award"></i> <span>Scholarships</span>
          </button>
          <button class="sidebar-link" data-question="What are UPES placement statistics?">
            <i class="fa-solid fa-chart-line"></i> <span>Placements</span>
          </button>
          <button class="sidebar-link" data-question="What campus services does UPES provide?">
            <i class="fa-solid fa-building-columns"></i> <span>Campus Services</span>
          </button>
          <button class="sidebar-link" data-question="What is the UPES academic calendar?">
            <i class="fa-solid fa-calendar-days"></i> <span>Academic Calendar</span>
          </button>
        </nav>
      </div>
    </aside>
    <div class="chat-main">
      <div class="messages-scroll" id="messages-scroll">
        <div class="messages-inner" id="messages-inner" aria-live="polite" aria-label="Chat messages">
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Composer (shared, always pinned bottom) ─────────────── -->
  <div class="composer" id="composer">
    <div class="composer-inner">
      <div class="composer-box" id="input-box">
        <textarea id="chat-input" rows="1" placeholder="Ask about UPES…"
          aria-label="Message UPES Helper" autocomplete="off" spellcheck="true" maxlength="2000"></textarea>
        <div class="composer-actions">
          <button class="composer-btn call-btn" id="call-btn" title="Voice call" aria-label="Voice call">
            <i class="fa-solid fa-phone"></i>
          </button>
          <button class="composer-btn voice-btn" id="voice-btn" title="Voice input" aria-label="Voice input">
            <i class="fa-solid fa-microphone"></i>
          </button>
          <button class="composer-btn send-btn" id="send-btn" aria-label="Send message" title="Send" disabled>
            <i class="fa-solid fa-arrow-up"></i>
          </button>
        </div>
      </div>
      <p class="composer-note">Answers from UPES knowledge base · <a href="https://www.upes.ac.in" target="_blank"
          rel="noopener">Verify at upes.ac.in</a></p>
    </div>
  </div>

  <!-- ─── Voice Call Overlay ──────────────────────────────────── -->
  <div class="call-overlay" id="call-overlay" aria-hidden="true" role="dialog" aria-label="AI Voice Call">
    <div class="call-container">
      <div class="call-avatar-ring">
        <div class="call-ripple"></div>
        <div class="call-ripple r2"></div>
        <div class="call-ripple r3"></div>
        <div class="call-avatar">
          <div class="lottie-graduation-hat"></div>
        </div>
      </div>

      <h2 class="call-name">UPES Helper</h2>
      <p class="call-status" id="call-status">Connecting…</p>
      <p class="call-timer" id="call-timer">00:00</p>

      <div class="call-visualizer" aria-hidden="true">
        <span class="viz-bar" style="--i:1"></span>
        <span class="viz-bar" style="--i:2"></span>
        <span class="viz-bar" style="--i:3"></span>
        <span class="viz-bar" style="--i:4"></span>
        <span class="viz-bar" style="--i:5"></span>
        <span class="viz-bar" style="--i:6"></span>
        <span class="viz-bar" style="--i:7"></span>
      </div>

      <div class="call-transcription" id="call-transcription"></div>

      <div class="call-actions">
        <button class="call-action-btn" id="call-mute" title="Mute">
          <i class="fa-solid fa-microphone"></i>
          <span>Mute</span>
        </button>
        <button class="call-action-btn end" id="call-end" title="End call">
          <i class="fa-solid fa-phone-slash"></i>
          <span>End</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>

</html>
